name: Playwright Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  # Allow manual or API-triggered runs (required for MCP)
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests (uses real Supabase)
      run: |
        # Fall back to local Postgres when the secret is not provided
        export DATABASE_URL="${DATABASE_URL:-postgresql://postgres:postgrespassword@127.0.0.1:5432/proofound}"
        npx playwright test
      env:
        # Real Supabase values should come from repo secrets or env vars
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
        # Pull from secret when available; shell fallback handles missing secret
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
