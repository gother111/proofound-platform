name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        NEXT_PUBLIC_USE_MOCK_SUPABASE: 'true'
        # Dummy Supabase creds are still required even when mocks are enabled
        NEXT_PUBLIC_SUPABASE_URL: 'http://localhost:54321/mock'
        NEXT_PUBLIC_SUPABASE_ANON_KEY: 'demo-anon-key'
        NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
        DATABASE_URL: ${{ secrets.DATABASE_URL }} # Optional if we mock DB access too or use a service container
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

