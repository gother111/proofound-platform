name: Strict Quality

on:
  workflow_dispatch:

concurrency:
  group: strict-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: ci
      NODE_OPTIONS: --max-old-space-size=6144
      PLAYWRIGHT_SERVER_MODE: prod
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PII_HASH_SALT: ${{ secrets.PII_HASH_SALT || 'ci-playwright-test-salt' }}
      ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
      ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
      ZOOM_REDIRECT_URI: ${{ secrets.ZOOM_REDIRECT_URI }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
      LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      E2E_PROVIDER_USER_ID: ${{ secrets.E2E_PROVIDER_USER_ID }}
      E2E_PROVIDER_USER_EMAIL: ${{ secrets.E2E_PROVIDER_USER_EMAIL }}
      E2E_PROVIDER_USER_PASSWORD: ${{ secrets.E2E_PROVIDER_USER_PASSWORD }}
      NEXT_PUBLIC_USE_MOCK_SUPABASE: "false"
      STRICT_PROVIDER_E2E_REQUIRE_CONNECTED: ${{ secrets.E2E_PROVIDER_USER_ID != '' && secrets.E2E_PROVIDER_USER_EMAIL != '' && secrets.E2E_PROVIDER_USER_PASSWORD != '' && 'true' || 'false' }}
      STRICT_PROVIDER_E2E_REQUIRE_BOTH: ${{ secrets.E2E_PROVIDER_USER_ID != '' && secrets.E2E_PROVIDER_USER_EMAIL != '' && secrets.E2E_PROVIDER_USER_PASSWORD != '' && 'true' || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Check migration drift
        run: npm run db:drift-check

      - name: Build application
        run: npm run build

      - name: Enforce strict E2E quality guard
        run: npm run test:strict:quality

      - name: Run accessibility strict contract
        run: npm run test:a11y:strict

      - name: Run individual strict flow suite
        run: npm run test:e2e:individual:strict

      - name: Run organization strict flow suite
        run: npm run test:e2e:org:strict

      - name: Run privacy strict flow suite
        run: npm run test:e2e:privacy:strict

      - name: Run providers strict flow suite
        run: npm run test:e2e:providers:strict

      - name: Upload strict test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-quality-test-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 30
