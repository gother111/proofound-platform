name: Retry Vercel Deploy Until Synced

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: retry-vercel-production-deploy
  cancel-in-progress: true

jobs:
  retry-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: ci
      NODE_OPTIONS: --max-old-space-size=6144
      FORCE_LINT: 'true'
      FORCE_STRICT_DEPLOY_CHECK: 'true'
      npm_config_engine_strict: 'true'
      PLAYWRIGHT_SERVER_MODE: prod
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PII_HASH_SALT: ${{ secrets.PII_HASH_SALT || 'ci-playwright-test-salt' }}
      CRON_SECRET: ci-launch-cron-secret
      SUS_STUDY_COMPLETE: 'true'
      ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
      ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
      ZOOM_REDIRECT_URI: ${{ secrets.ZOOM_REDIRECT_URI }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
      LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      LINKEDIN_REDIRECT_URI: ${{ secrets.LINKEDIN_REDIRECT_URI }}
      E2E_PROVIDER_USER_ID: ${{ secrets.E2E_PROVIDER_USER_ID }}
      E2E_PROVIDER_USER_EMAIL: ${{ secrets.E2E_PROVIDER_USER_EMAIL }}
      E2E_PROVIDER_USER_PASSWORD: ${{ secrets.E2E_PROVIDER_USER_PASSWORD }}
      NEXT_PUBLIC_USE_MOCK_SUPABASE: 'false'
      STRICT_PROVIDER_E2E_REQUIRE_CONNECTED: 'true'
      STRICT_PROVIDER_E2E_REQUIRE_BOTH: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict MVP release gate
        run: node ./scripts/run-mvp-strict-gates.mjs --artifact-dir .artifacts/mvp-strict-gates/retry-vercel-deploy

      - name: Install Python package manager
        run: |
          python3 -m pip install --user uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Read repository head SHA
        id: repo
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Delete stale production deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_CANONICAL_PROJECT: proofound-platform
        run: npm run vercel:cancel-stale -- --apply --target production --branch master --limit 100

      - name: Read production deployment SHA
        id: live
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          (async () => {
            const token = process.env.VERCEL_TOKEN;
            const projectId = process.env.VERCEL_PROJECT_ID;

            if (!token || !projectId) {
              console.log('sha=');
              console.log('deployment=');
              return;
            }

            const query = new URLSearchParams({
              projectId,
              limit: '100',
              target: 'production',
            });

            const response = await fetch(`https://api.vercel.com/v6/deployments?${query.toString()}`, {
              headers: {
                Authorization: `Bearer ${token}`,
              },
            });

            if (!response.ok) {
              console.log('sha=');
              console.log('deployment=');
              return;
            }

            const json = await response.json();
            const readyDeployment = (json.deployments ?? []).find((deployment) => {
              const state = String(deployment.readyState || '').toUpperCase();
              return state === 'READY' && deployment.meta?.githubCommitRef === 'master';
            });

            console.log(`sha=${readyDeployment?.meta?.githubCommitSha ?? ''}`);
            console.log(`deployment=${readyDeployment?.uid ?? ''}`);
          })().catch(() => {
            console.log('sha=');
            console.log('deployment=');
          });
          NODE

      - name: Detect active production deployment for repository SHA
        id: pending
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_CANONICAL_PROJECT: proofound-platform
          REPO_SHA: ${{ steps.repo.outputs.sha }}
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          (async () => {
            const token = process.env.VERCEL_TOKEN;
            const projectId = process.env.VERCEL_PROJECT_ID;
            const repoSha = process.env.REPO_SHA;

            if (!token || !projectId || !repoSha) {
              console.log('exists=false');
              return;
            }

            const query = new URLSearchParams({
              projectId,
              limit: '100',
              target: 'production',
            });

            const response = await fetch(`https://api.vercel.com/v6/deployments?${query.toString()}`, {
              headers: {
                Authorization: `Bearer ${token}`,
              },
            });

            if (!response.ok) {
              console.log('exists=false');
              return;
            }

            const json = await response.json();
            const hasActiveDeploy = (json.deployments ?? []).some((deployment) => {
              const state = String(deployment.readyState || '').toUpperCase();
              return (
                deployment.meta?.proofoundDeploymentKind === 'prebuilt' &&
                deployment.meta?.githubCommitRef === 'master' &&
                deployment.meta?.githubCommitSha === repoSha &&
                ['BUILDING', 'INITIALIZING', 'QUEUED'].includes(state)
              );
            });

            console.log(`exists=${hasActiveDeploy ? 'true' : 'false'}`);
          })().catch(() => {
            console.log('exists=false');
          });
          NODE

      - name: Print sync status
        run: |
          echo "Repo SHA: ${{ steps.repo.outputs.sha }}"
          echo "Live SHA: ${{ steps.live.outputs.sha }}"
          echo "Live deployment: ${{ steps.live.outputs.deployment }}"
          echo "Active prebuilt deploy for repo SHA: ${{ steps.pending.outputs.exists }}"

      - name: Pull production Vercel environment
        if: steps.repo.outputs.sha != steps.live.outputs.sha && steps.pending.outputs.exists != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run vercel:pull:production

      - name: Build production deployment output
        if: steps.repo.outputs.sha != steps.live.outputs.sha && steps.pending.outputs.exists != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run vercel:build:production

      - name: Inspect prebuilt output
        if: steps.repo.outputs.sha != steps.live.outputs.sha && steps.pending.outputs.exists != 'true'
        run: |
          test -f .vercel/output/config.json
          test -f .vercel/output/builds.json

      - name: Deploy production prebuilt output
        id: deploy
        if: steps.repo.outputs.sha != steps.live.outputs.sha && steps.pending.outputs.exists != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deployment_url="$(npm run --silent vercel:deploy:prebuilt:production)"
          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## Production deployment sync"
            echo
            echo "- Repo SHA: \`${{ steps.repo.outputs.sha }}\`"
            echo "- Live production deployment SHA before workflow: \`${{ steps.live.outputs.sha || 'unknown' }}\`"
            echo "- Live production deployment id before workflow: \`${{ steps.live.outputs.deployment || 'unknown' }}\`"
            echo "- Active prebuilt deploy already running: \`${{ steps.pending.outputs.exists }}\`"
            if [ -n "${{ steps.deploy.outputs.url }}" ]; then
              echo "- Prebuilt deployment URL: ${{ steps.deploy.outputs.url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
