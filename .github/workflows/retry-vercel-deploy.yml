name: Retry Vercel Deploy Until Synced

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: retry-vercel-production-deploy
  cancel-in-progress: true

jobs:
  retry-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Read repository head SHA
        id: repo
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Delete stale production deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_CANONICAL_PROJECT: proofound-platform
        run: npm run vercel:cancel-stale -- --apply --target production --branch master --limit 100

      - name: Read production health SHA
        id: live
        env:
          HEALTH_URL: https://proofound.io/api/health
        run: |
          response="$(curl -fsS "$HEALTH_URL" || true)"
          live_sha="$(
            printf '%s' "$response" | node -e "let s='';process.stdin.on('data',c=>s+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(s);process.stdout.write(j.version||'')}catch{process.stdout.write('')}})"
          )"
          echo "sha=${live_sha}" >> "$GITHUB_OUTPUT"

      - name: Detect active production deployment for repository SHA
        id: pending
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_CANONICAL_PROJECT: proofound-platform
          REPO_SHA: ${{ steps.repo.outputs.sha }}
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          (async () => {
            const token = process.env.VERCEL_TOKEN;
            const projectId = process.env.VERCEL_PROJECT_ID;
            const repoSha = process.env.REPO_SHA;

            if (!token || !projectId || !repoSha) {
              console.log('exists=false');
              return;
            }

            const query = new URLSearchParams({
              projectId,
              limit: '100',
              target: 'production',
            });

            const response = await fetch(`https://api.vercel.com/v6/deployments?${query.toString()}`, {
              headers: {
                Authorization: `Bearer ${token}`,
              },
            });

            if (!response.ok) {
              console.log('exists=false');
              return;
            }

            const json = await response.json();
            const hasActiveDeploy = (json.deployments ?? []).some((deployment) => {
              const state = String(deployment.readyState || '').toUpperCase();
              return (
                deployment.source === 'git' &&
                deployment.meta?.githubCommitRef === 'master' &&
                deployment.meta?.githubCommitSha === repoSha &&
                ['BUILDING', 'INITIALIZING', 'QUEUED'].includes(state)
              );
            });

            console.log(`exists=${hasActiveDeploy ? 'true' : 'false'}`);
          })().catch(() => {
            console.log('exists=false');
          });
          NODE

      - name: Print sync status
        run: |
          echo "Repo SHA: ${{ steps.repo.outputs.sha }}"
          echo "Live SHA: ${{ steps.live.outputs.sha }}"
          echo "Active deploy for repo SHA: ${{ steps.pending.outputs.exists }}"

      - name: Trigger production deploy
        if: steps.repo.outputs.sha != steps.live.outputs.sha && steps.pending.outputs.exists != 'true'
        env:
          VERCEL_CLI_VERSION: 41.7.3
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "Triggering production deploy hook."
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
            exit 0
          fi

          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "Missing Vercel deploy credentials. Set either VERCEL_DEPLOY_HOOK_URL or VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID."
            exit 1
          fi

          echo "Deploy hook secret not set. Falling back to Vercel CLI deploy with retries."
          attempts=0
          max_attempts=3
          while [ "$attempts" -lt "$max_attempts" ]; do
            attempts=$((attempts + 1))
            echo "Vercel deploy attempt ${attempts}/${max_attempts}"
            if timeout 1200 npx "vercel@${VERCEL_CLI_VERSION}" deploy --prod --yes --token "${VERCEL_TOKEN}"; then
              exit 0
            fi
            status=$?
            if [ "$status" -eq 124 ]; then
              echo "Deploy attempt ${attempts} timed out after 20 minutes."
            fi
            sleep_seconds=$((attempts * 30))
            echo "Deploy attempt ${attempts} failed. Waiting ${sleep_seconds}s before retry."
            sleep "${sleep_seconds}"
          done

          echo "All Vercel deploy attempts failed."
          exit 1
