name: Cancel Stale Vercel Deployments

on:
  pull_request:
    branches: [master]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cancel-stale-vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cancel-stale:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event.pull_request.base.repo.full_name == github.repository &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'

      - name: Delete superseded queued or building deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_CANONICAL_PROJECT: proofound-platform
        run: npm run vercel:cancel-stale -- --apply --limit 100
