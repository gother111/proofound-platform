name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: ci
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Run landing page contract
        run: npm run test:e2e:landing

      - name: Rebuild application for production start
        run: npm run build

      - name: Start app server (background)
        run: |
          npm run start -- -p 3000 > /tmp/next.log 2>&1 &
          echo $! > /tmp/next_pid
          # wait for health and active database connectivity
          for i in {1..30}; do
            response="$(curl -fsS http://localhost:3000/api/health || true)"
            if echo "$response" | grep -q '"status":"healthy"' && echo "$response" | grep -q '"connected":true'; then
              echo "App is healthy and DB is connected"
              exit 0
            fi
            sleep 1
          done
          echo "App did not become healthy with DB connectivity" && cat /tmp/next.log && exit 1

      - name: Run performance budgets (TTI/CLS/API p95)
        env:
          BASE_URL: http://localhost:3000
        run: npm run perf:budgets

      - name: Go / No-Go gates
        env:
          BASE_URL: http://localhost:3000
          SUS_STUDY_COMPLETE: "true"
        run: npm run go:no-go

      - name: Stop app server
        if: always()
        run: |
          if [ -f /tmp/next_pid ]; then
            kill "$(cat /tmp/next_pid)" || true
          fi

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
